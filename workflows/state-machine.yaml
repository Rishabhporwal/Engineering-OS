# Brain Engineering OS — status state machine.
# Defines every status a requirement can have and the legal transitions.
# Mirrored in docs/operating-system.md §Status Lifecycle.

name: status-state-machine
schema_version: 1

states:
  intake:
    description: Founder submitted; not yet picked up.
    transitions_to: [cto-review, killed]

  cto-review:
    description: CTOA + 0-2 personas active (by complexity).
    transitions_to: [architect, dev-parallel, challenged-back, killed]  # dev-parallel = EXPRESS lane (skips Architect)

  challenged-back:
    description: CTOA pushed back to Founder.
    transitions_to: [cto-review, killed]

  architect:
    description: Aryan designing.
    transitions_to: [dev-parallel, cto-review]  # back to CTOA if requirement unworkable

  dev-parallel:
    description: Builders active.
    transitions_to: [parallel-review, security-review, qa-review, dev-blocked, architect]  # parallel-review = STANDARD/HIGH-STAKES (Security ∥ QA); qa-review = EXPRESS lane (skips Security)

  dev-blocked:
    description: A builder is blocked; surfaces in /status.
    transitions_to: [dev-parallel, architect, cto-review]

  parallel-review:
    description: STANDARD/HIGH-STAKES lane — Shreya (Security, Stage 4) ∥ Tanvi (QA, Stage 5) reviewing CONCURRENTLY; the top-level orchestrator spawns both in one message and reconciles the two verdicts (both PASS → final-review; either fails → the matching *-bounced).
    transitions_to: [final-review, security-bounced, qa-bounced]

  security-review:
    description: Shreya reviewing (sequential path / express edge cases; standard & high-stakes use parallel-review).
    transitions_to: [qa-review, parallel-review, security-bounced]

  security-bounced:
    description: Shreya found CRITICAL/HIGH or compliance gap; back to dev.
    transitions_to: [dev-parallel]

  qa-review:
    description: Tanvi running tests + verification.
    transitions_to: [final-review, awaiting-founder, qa-bounced]  # awaiting-founder = EXPRESS lane (skips Final-review)

  qa-bounced:
    description: Coverage gap, smoke failed, parity broken; back to dev.
    transitions_to: [dev-parallel]

  final-review:
    description: CTOA final pass.
    transitions_to: [awaiting-founder, final-bounced]

  final-bounced:
    description: CTOA bouncing to specific earlier stage.
    transitions_to: [architect, dev-parallel, security-review, qa-review]

  awaiting-founder:
    description: Founder gate.
    transitions_to: [approved, rejected]

  rejected:
    description: Founder rejected; archived with reason. (Terminal until CTOA re-routes.)
    transitions_to: [cto-review, architect, dev-parallel]  # CTOA picks based on reason

  approved:
    description: Founder approved; DevOps (Jatin) takes over for Stage 8.
    transitions_to: [awaiting-founder-commit, deploying-staging]  # awaiting-founder-commit if Jatin stages product code for the Founder to commit; deploying-staging if product code is already committed (e.g. Founder committed at the Stage-7 gate)

  awaiting-founder-commit:
    description: Stage 8 — Jatin staged the product code + committed the `.engineering-os/` audit trail (chore(eos)); the Founder commits + pushes the PRODUCT code (governance gate — agents never commit product code). The Founder retains commit authority.
    transitions_to: [deploying-staging, awaiting-push-fix]

  awaiting-push-fix:
    description: The push-success gate failed (e.g. 403 / remote ahead); the Founder resolves remote/auth, then re-pushes. Jatin re-verifies with `git push --dry-run`.
    transitions_to: [deploying-staging, awaiting-founder-commit]

  deploying-staging:
    description: CI passed; staging deploy in flight.
    transitions_to: [awaiting-prod-deploy, staging-failed]

  staging-failed:
    description: Staging verification failed.
    transitions_to: [dev-parallel, security-review]  # triage

  awaiting-prod-deploy:
    description: Staging green; ready for prod push.
    transitions_to: [deploying-prod]

  deploying-prod:
    description: Production deploy in flight.
    transitions_to: [monitoring, rolled-back]

  monitoring:
    description: Production live; 48h watch.
    transitions_to: [shipped, rolled-back]

  rolled-back:
    description: Auto-rollback fired or manual rollback.
    transitions_to: [security-review, dev-parallel]  # re-enter for triage

  shipped:
    description: 48h post-deploy with no incidents. (Terminal happy path.)
    transitions_to: []

  paused:
    description: Manually paused by operator. Tracked in /status but no agent acts.
    transitions_to: [intake, cto-review, architect, dev-parallel, security-review, qa-review, final-review]

  killed:
    description: Archived before any work. (Terminal.)
    transitions_to: []
