# Engineering OS — status state machine.
# Defines every status a requirement can have and the legal transitions.
# Mirrored in docs/operating-system.md §Status Lifecycle.

name: status-state-machine
schema_version: 1

states:
  intake:
    description: Stakeholder submitted; not yet picked up.
    transitions_to: [cto-review, killed]

  cto-review:
    description: Engineering Advisor + 0-2 personas active (by complexity).
    transitions_to: [architect, dev-parallel, challenged-back, killed]  # dev-parallel = EXPRESS lane (skips Architect)

  challenged-back:
    description: The Engineering Advisor pushed back to the Stakeholder.
    transitions_to: [cto-review, killed]

  architect:
    description: The Architect is designing.
    transitions_to: [dev-parallel, cto-review]  # back to the Engineering Advisor if requirement unworkable

  dev-parallel:
    description: Builders active.
    transitions_to: [parallel-review, security-review, qa-review, dev-blocked, architect]  # parallel-review = STANDARD/HIGH-STAKES (Security ∥ QA); qa-review = EXPRESS lane (skips Security)

  dev-blocked:
    description: A builder is blocked; surfaces in /status.
    transitions_to: [dev-parallel, architect, cto-review]

  parallel-review:
    description: STANDARD/HIGH-STAKES lane — Security Reviewer (Stage 4) ∥ QA Engineer (Stage 5) reviewing CONCURRENTLY; the top-level orchestrator spawns both in one message and reconciles the two verdicts (both PASS → final-review; either fails → the matching *-bounced).
    transitions_to: [final-review, security-bounced, qa-bounced]

  security-review:
    description: Security Reviewer reviewing (sequential path / express edge cases; standard & high-stakes use parallel-review).
    transitions_to: [qa-review, parallel-review, security-bounced]

  security-bounced:
    description: Security Reviewer found CRITICAL/HIGH or compliance gap; back to dev.
    transitions_to: [dev-parallel]

  qa-review:
    description: QA Engineer running tests + verification.
    transitions_to: [final-review, awaiting-stakeholder, qa-bounced]  # awaiting-stakeholder = EXPRESS lane (skips Final-review)

  qa-bounced:
    description: Coverage gap, smoke failed, parity broken; back to dev.
    transitions_to: [dev-parallel]

  final-review:
    description: Engineering Advisor final pass.
    transitions_to: [awaiting-stakeholder, final-bounced]

  final-bounced:
    description: The Engineering Advisor is bouncing to a specific earlier stage.
    transitions_to: [architect, dev-parallel, security-review, qa-review]

  awaiting-stakeholder:
    description: Stakeholder gate.
    transitions_to: [approved, rejected]

  rejected:
    description: Stakeholder rejected; archived with reason. (Terminal until the Engineering Advisor re-routes.)
    transitions_to: [cto-review, architect, dev-parallel]  # the Engineering Advisor picks based on reason

  approved:
    description: Stakeholder approved; Platform/SRE takes over for Stage 8.
    transitions_to: [awaiting-stakeholder-commit, deploying-staging]  # awaiting-stakeholder-commit if Platform/SRE stages product code for the Stakeholder to commit; deploying-staging if product code is already committed (e.g. the Stakeholder committed at the Stage-7 gate)

  awaiting-stakeholder-commit:
    description: Stage 8 — Platform/SRE staged the product code + committed the `.engineering-os/` audit trail (chore(eos)); the Stakeholder commits + pushes the PRODUCT code (governance gate — agents never commit product code). The Stakeholder retains commit authority.
    transitions_to: [deploying-staging, awaiting-push-fix]

  awaiting-push-fix:
    description: The push-success gate failed (e.g. 403 / remote ahead); the Stakeholder resolves remote/auth, then re-pushes. Platform/SRE re-verifies with `git push --dry-run`.
    transitions_to: [deploying-staging, awaiting-stakeholder-commit]

  deploying-staging:
    description: CI passed; staging deploy in flight.
    transitions_to: [awaiting-prod-deploy, staging-failed]

  staging-failed:
    description: Staging verification failed.
    transitions_to: [dev-parallel, security-review]  # triage

  awaiting-prod-deploy:
    description: Staging green; ready for prod push.
    transitions_to: [deploying-prod]

  deploying-prod:
    description: Production deploy in flight.
    transitions_to: [monitoring, rolled-back]

  monitoring:
    description: Production live; 48h watch.
    transitions_to: [shipped, rolled-back]

  rolled-back:
    description: Auto-rollback fired or manual rollback.
    transitions_to: [security-review, dev-parallel]  # re-enter for triage

  shipped:
    description: 48h post-deploy with no incidents. (Terminal happy path.)
    transitions_to: []

  paused:
    description: Manually paused by the operator. Tracked in /status but no agent acts.
    transitions_to: [intake, cto-review, architect, dev-parallel, security-review, qa-review, final-review]

  killed:
    description: Archived before any work. (Terminal.)
    transitions_to: []
