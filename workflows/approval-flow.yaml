# Engineering OS — Stakeholder approval flow.
# Mechanics for the Stage 7 human gate.

name: stakeholder-approval-flow
schema_version: 1

trigger:
  event: status-transition
  from: final-review
  to: awaiting-stakeholder

inputs_to_stakeholder:
  - artifact: 11-final-review.md
    purpose: The Engineering Advisor's recommendation + sub-reviews
  - artifact: 02-cto-advisor-review.md
    purpose: Original intake analysis (drift check)
  - artifact: 06-architecture-plan.md
    purpose: What was promised
  - artifact: 09-security-review.md
    purpose: Security Reviewer's PASS evidence
  - artifact: 10-qa-review.md
    purpose: QA Engineer's PASS evidence
  - reference: audit-log
    purpose: Recent decisions for trend context (the system-of-record audit log, where the Canon requires one)

actions_available_to_stakeholder:
  - command: /approve <req-id> [note]
    effect: status → approved → Platform/SRE runs Stage 8
  - command: /reject <req-id> <reason>
    effect: status → rejected → the Engineering Advisor re-routes based on reason

stakeholder_required_fields:
  approve:
    - actor: stakeholder
    - decision: approved
    - ts: now
    - note: optional
  reject:
    - actor: stakeholder
    - decision: rejected
    - ts: now
    - reason: required  # rejection without rationale is forbidden

notifications:
  on_awaiting_stakeholder:
    channels:
      - in-cli  # always
      - slack   # if SLACK_WEBHOOK_URL env var set
    template: |
      [engineering-os] Awaiting your approval: {{req_id}} — {{title}}
      Final review: {{final_review_recommendation}}
      Run folder: {{run_dir}}
      Approve: /approve {{req_id}}
      Reject:  /reject {{req_id}} <reason>

  on_approved:
    channels: [in-cli, slack]
    template: |
      [engineering-os] {{req_id}} approved by {{actor}} at {{ts}}.
      Platform/SRE starting Stage 8 (deploy).

  on_rejected:
    channels: [in-cli, slack]
    template: |
      [engineering-os] {{req_id}} rejected by {{actor}} at {{ts}}.
      Reason: {{reason}}
      The Engineering Advisor is re-routing.

audit:
  every_action_writes:
    - audit_log_entry: { type: decision, actor: stakeholder }   # the system-of-record audit log, where the Canon requires one
    - state_active_json_update: { status, stage }
    - artifact: 12-stakeholder-decision.json

# When the Stakeholder is "wrong"
stakeholder_wrong_protocol: |
  The team can push back on the Stakeholder (anti-blind-agreement rule).
  When the team challenges and the Stakeholder still says "approve":
    1. The Stakeholder's approval lands.
    2. Team logs the challenge AND the Stakeholder's override in the audit log.
    3. Override creates a tech-debt item with owner + date.
    4. Stage 8 proceeds.
  This preserves accountability while honoring Stakeholder authority.
