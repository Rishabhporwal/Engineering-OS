# Engineering OS — the canonical 8-stage pipeline as data.
# Read by hooks, slash commands, and documentation generators.

name: requirement-to-release
description: >
  The 8-stage pipeline every feature flows through, from Stakeholder
  submission to production deploy.
schema_version: 1

# Personas (the OS roles) — must match agents/ filenames and .engineering-os/memory/agents/ paths.
# Human/team identities (if any) attach per adoption in .engineering-os/team-roster.md.
personas:
  cto_advisor:
    role: Engineering Advisor
    agent: cto-advisor
    journal: cto-advisor.journal.md
  dynamic_persona: { agent: dynamic-persona-generator, journal: null }
  architect:
    role: Architect
    agent: architect
    journal: architect.journal.md
  backend_developer:
    role: Backend Engineer
    agent: backend-developer
    journal: backend.journal.md
  frontend_web_developer:
    role: Frontend/Web Engineer
    agent: frontend-web-developer
    journal: frontend-web.journal.md
  mobile_developer:
    role: Mobile Engineer
    agent: mobile-developer
    journal: frontend-mobile.journal.md
  intelligence_engineer:
    role: AI/ML Engineer
    agent: intelligence-engineer
    journal: intelligence.journal.md
  security_reviewer:
    role: Security Reviewer
    agent: security-reviewer
    journal: security.journal.md
  qa_agent:
    role: QA Engineer
    agent: qa-agent
    journal: qa.journal.md
  platform_devops:
    role: Platform/SRE
    agent: platform-devops
    journal: platform.journal.md
  product_manager:
    role: Delivery Coordinator
    agent: product-manager
    journal: product.journal.md
  stakeholder:
    role: Stakeholder
    agent: null  # human

stages:
  - id: 1
    name: cto-advisor-intake
    owner: cto_advisor
    inputs: [requirement_template]
    outputs: [cto_advisor_review, dynamic_persona_reviews]
    spawns_subagents: [dynamic_persona_generator, count: "0-2 by complexity"]
    gate: G1
    next_on_advance: 2
    on_challenge_back: stakeholder
    on_kill: archive

  - id: 2
    name: architect
    owner: architect
    inputs: [cto_advisor_review, dynamic_persona_reviews]
    outputs: [architecture_plan, tracks_tagged]
    gate: G2
    next_on_advance: 3
    on_bounce: 1

  - id: 3
    name: parallel-development
    owners_dynamic: tracks_tagged  # any subset of {backend, web, mobile, intelligence}
    inputs: [architecture_plan]
    outputs: [developer_report_per_builder]
    gate: G3
    next_on_advance: 4
    on_bounce: 2

  - id: 4
    name: security-review
    owner: security_reviewer
    inputs: [developer_reports]
    outputs: [security_review]
    gate: G4
    veto: true
    next_on_pass: 5
    on_fail: 3

  - id: 5
    name: qa
    owner: qa_agent
    inputs: [developer_reports, security_review]
    outputs: [qa_review]
    gate: G5
    veto: true
    next_on_pass: 6
    on_fail: 3

  - id: 6
    name: cto-advisor-final-review
    owner: final_reviewer
    inputs: [all_prior_artifacts]
    outputs: [final_review]
    gate: G6
    veto: true
    next_on_pass: 7
    on_bounce_target: dynamic  # the Engineering Advisor chooses

  - id: 7
    name: stakeholder-approval
    owner: stakeholder
    human_gate: true
    inputs: [final_review, full_run_artifacts]
    outputs: [stakeholder_decision]
    gate: G7
    next_on_approve: 8
    on_reject: 6  # the Engineering Advisor re-routes

  - id: 8
    name: platform-devops
    owner: platform_devops
    inputs: [stakeholder_decision]
    outputs: [deployment_report]
    gate: [G8, G9]
    auto_rollback_triggers:
      - p95_latency_ms_above: 2000
        for_minutes: 5
      - error_rate_pct_above: 1.0
        for_minutes: 5
      - health_check_failures_consecutive: 2
    next_on_clean_48h: shipped
    on_rollback: 4

# ---------------------------------------------------------------------------
# Lanes (risk-based tiering). The Engineering Advisor assigns the lane at Stage 1.
# The lane decides WHICH stages run. The 8-stage list above is the full path
# (= high-stakes). Express and standard skip stages to cut wall-clock + tokens.
# Classifier rules + trigger-surface list: ../docs/feature-tiering.md.
# ---------------------------------------------------------------------------
lanes:
  express:
    description: >
      Trivial change with ZERO trigger-surface touch (copy, docs, config,
      dependency bump, styling, pure refactor with no behavior change, or a
      clear repeat of a registry pattern). Skips Architect (2), Security (4),
      Final-review (6) — i.e. all three deep-tier-heavy stages.
    requires_empty_trigger_surfaces: true   # any trigger surface ⇒ NOT express
    stages: [1, 3, 5, 7, 8]
    stage_notes:
      1: "Engineering Advisor: classify + confirm trivial. 0 personas. No brainstorm. Hand straight to ONE dev."
      3: "Single relevant builder only. No fan-out."
      5: "QA Engineer: real-network smoke + lint only. No mutation tests."
      7: "Stakeholder gate (or existing delegation auto-approve)."
      8: "Platform/SRE: standard deploy + 48h monitor."
    personas: 0
    mandatory_veto: []          # Security Reviewer skipped — express never touches its surfaces
    artifacts: combined          # 1 combined artifact, not the full numbered set

  standard:
    description: >
      Normal feature, no trigger-surface touch. Full pipeline, lean. 0–1 persona.
    requires_empty_trigger_surfaces: true
    stages: [1, 2, 3, 4, 5, 6, 7, 8]
    personas: "0-1"
    mandatory_veto: [qa_agent]   # Security Reviewer runs but rarely blocks; QA always gates
    artifacts: key               # key artifacts only

  high-stakes:
    description: >
      Touches a trigger surface (auth, multi-tenancy, agent/MCP tools, connectors,
      outbound channels, PII, schema/proto, money, the product's compliance regime). Full rigor.
    requires_empty_trigger_surfaces: false
    stages: [1, 2, 3, 4, 5, 6, 7, 8]
    personas: 2
    mandatory_veto: [security_reviewer, qa_agent]
    mutation_tests: required
    artifacts: full

terminal_states:
  - shipped
  - rejected
  - killed
  - rolled_back  # transient — re-enters Stage 4

gates_doc: ../docs/quality-gates.md
escalation_doc: ../docs/escalation-rules.md
