# Engineering OS v2 — declarative pipeline
#
# This file is the SINGLE SOURCE OF TRUTH for control-flow: lanes, stages,
# model tiers, routing, and the delta-review rules. In v1 this logic lived
# inside the deep-tier cto-advisor prompt and was re-reasoned on every intake
# (a major cost + drift surface). In v2 the orchestrator (pipeline/orchestrator.md)
# reads THIS file and routes deterministically; agents carry only judgment.
#
# Validated by tools/pipeline_doctor.py. Routing tested by tools/ab_bench.py.

version: 2

# ---------------------------------------------------------------------------
# Model tiers — the OS applies its own cost-routing doctrine to itself.
# (v1 ran intake/security/final on the deep tier and re-ran them fully on every bounce.)
# The tier values below (haiku/sonnet/opus) are ILLUSTRATIVE bindings of three
# generic effort levels — mechanical ≈ haiku, standard ≈ sonnet, deep ≈ opus.
# A product may bind these keys to whatever models its STACK.md declares; the
# KEYS (intake_mechanical, architect, …) are the cross-file interface — preserved.
# ---------------------------------------------------------------------------
model_tiers:
  intake_mechanical: haiku   # mechanical: lane/dependency/persona-count are deterministic (lane-classifier.md)
  intake_judgment:   sonnet  # standard: requirement-quality + challenge synthesis
  architect:         opus    # deep: runs once per requirement; deep design reasoning — justified
  builder:           sonnet  # standard
  security_default:  sonnet  # standard: loop is checklist + scanners + guard-presence checks
  security_escalate: opus    # deep: ONLY on a CRITICAL/compliance ambiguity needing deep reasoning
  qa:                sonnet  # standard
  final_judgment:    opus    # deep: the go/no-go judgment call stays on the deep tier
  delta_reverify:    sonnet  # standard: re-verifying an already-PASSed surface after a scoped fix
  persona_bounded:   haiku   # mechanical
  persona_deep:      sonnet  # standard

# ---------------------------------------------------------------------------
# Lanes — which stages run, by risk. Lane is assigned by lane-classifier.md.
# CONSERVATIVE RULE (Stakeholder): on any doubt between lanes, pick the higher one.
# ---------------------------------------------------------------------------
lanes:
  # EXPERIMENTAL (opt-in via /requirement --lean, default OFF until the A/B proves it).
  # The strategic-review thesis: one disciplined standard-tier session — carrying the canon +
  # challenge-framework + negative-control DoD + memory recall — does build AND structured
  # self-review against the security/QA/compliance checklist, escalating to the full pipeline
  # ONLY if it discovers a trigger surface mid-build. If the A/B (docs/lean-vs-full-ab.md)
  # shows lean ≈ full quality at a fraction of cost on no-trigger work, flip this to the default
  # and demote the multi-agent pipeline to the high_stakes carve-out.
  lean:
    when: "OPT-IN only (--lean). Zero trigger surfaces. One standard-tier builder session: build + self-review vs the gate checklists."
    stages: [build]                      # the single tagged builder also self-gates (no separate review spawns)
    personas: 0
    escalate_if: "any trigger surface (compliance/tenancy/metric/decision-log/money/outbound/auth) is discovered mid-build → abort lean, restart as high_stakes"
    self_review_against: [security-baseline, qa-agent DoD, compliance-engine, verification_validity]
  express:
    when: "zero trigger surfaces AND purely trivial (copy/docs/config/styling/zero-behavior refactor/clear registry repeat)"
    stages: [intake, build, qa]          # no architect, no security, no final
    personas: 0
    # POST-BUILD RECHECK (fixes the war-game's only NO): the lane was fixed from the requirement
    # TEXT at intake, before any code existed. A "rename a label" can grow into a requireRole/
    # tenant-key change at build time and ship through express with NO security review. So at
    # build→qa the orchestrator re-runs classify_lane on the ACTUAL staged diff:
    escalate_if: "post-build `classify_lane --diff <staged> --prior <intake-surfaces>` returns escalate=true (the diff touched a surface the text missed) → VOID express, restart as high_stakes (reinstate architect + security + final)."
    always_run_on_qa: "validity_check --paths <changed test files> — the always-on BYPASSRLS/inert/tautology scan, forced even on express, so a bypass-green test can't ride the lane's 'trivial' framing past the only gate."
  standard:
    when: "zero trigger surfaces AND not trivial; OR the foundational-scaffolding carve-out"
    stages: [intake, architect, build, security, qa, final]
    personas: "0-1"
    escalate_if: "post-build `classify_lane --diff <staged> --prior <intake-surfaces>` returns escalate=true → add the missing high_stakes rigor (2 personas + mutation tests) for the surface the diff revealed."
  high_stakes:
    when: ">=1 trigger surface touched"
    stages: [intake, architect, build, security, qa, final]
    personas: 2
    mutation_tests: required

# ---------------------------------------------------------------------------
# Stages — owner + model tier + the artifact each produces.
# ---------------------------------------------------------------------------
stages:
  intake:    {n: 1, owner: cto-advisor,        model: intake_judgment, artifact: "02-cto-advisor-review.md"}
  architect: {n: 2, owner: architect,          model: architect,       artifact: "03-architecture-plan.md"}
  build:     {n: 3, owner: "<tagged-builders>", model: builder,        artifact: "0N-developer-report.md", parallel: true}
  security:  {n: 4, owner: security-reviewer,  model: security_default, artifact: "security-review.md", veto: true}
  qa:        {n: 5, owner: qa-agent,           model: qa,              artifact: "qa-review.md", veto: true}
  final:     {n: 6, owner: final-reviewer,        model: final_judgment,  artifact: "11-final-review.md", veto: true}
  deploy:    {n: 8, owner: platform-devops,    model: builder,         artifact: "13-deployment-report.md"}
  # Stage 7 = Stakeholder human gate (no agent).

# Security ∥ QA run in parallel (one orchestrator message, two Agent calls).
parallel_reviews: [security, qa]

# ---------------------------------------------------------------------------
# Routing — deterministic next-stage map the orchestrator follows.
# ---------------------------------------------------------------------------
routing:
  intake:
    ADVANCE: {express: build, standard: architect, high_stakes: architect}
    needs_personas: "spawn personas (tiered) ∥, then re-spawn cto-advisor to synthesize"
    CHALLENGE_BACK: stakeholder
    KILL: terminal
  architect:
    ADVANCE: build
    BOUNCE: intake
  build:
    done: {express: qa, standard: parallel_reviews, high_stakes: parallel_reviews}
    BOUNCE: architect
  reviews:                       # security ∥ qa reconcile
    both_PASS: {express: stakeholder_gate, standard: final, high_stakes: final}
    any_BOUNCE: build            # re-spawn responsible builder, then DELTA re-review (see below)
  final:
    PASS: stakeholder_gate
    BOUNCE: "<bounce_target>"
  stakeholder_gate:
    approve: deploy
    reject: intake

safety_bound:
  # Lane-aware (Platform/SRE): a flat 20 was a footgun — a legit high_stakes feature with
  # parallel builder tracks + 2 reviewers + a couple of bounces burns ~18-20 spawns
  # while behaving correctly, then force-stops indistinguishably from a runaway loop.
  max_spawns_by_lane:
    express: 8
    standard: 14
    high_stakes: 28
  on_exceed:
    action: "PAUSE-AND-CONFIRM, not a hard stop"
    do: |
      At the lane cap, STOP and surface to the Stakeholder WITH the spawn history (from the
      orchestrator cursor: stage, outstanding, spawns, last_route) so loop-vs-legit is
      DISTINGUISHABLE. The Stakeholder either confirms a one-time bump (`/resume` continues) or
      kills it. Do NOT assume "likely a loop" — a big feature legitimately reaching the cap
      looks identical to a loop only if you hide the history. Always leave state + cursor
      consistent for /resume.

# ---------------------------------------------------------------------------
# DELTA RE-REVIEW — the dominant token-cost lever (fixes O12).
# v1 re-ran the ENTIRE security+qa loop on any bounce, even a 1-char fix.
# v2: the orchestrator passes review_scope to the re-spawned reviewer.
# ---------------------------------------------------------------------------
delta_review:
  rule: |
    On a BOUNCE-fix re-review:
      - review_scope = full   IF the fix touches a high_stakes_path (below)
      - review_scope = delta  OTHERWISE
    A delta review re-verifies the bounced finding(s) + DIFF-PLUS-RELEVANT-SLICES,
    NOT the whole surface, NOT diff-only. (Research: diff-only "risks missing global
    interactions"; diff + ranked callers/imports/tests captures ~80–90% of needed
    context at far below full cost.) The reviewer reads the prior PASS artifact + the
    diff + the changed code's direct callers/importers/tests. Runs on
    model_tiers.delta_reverify (the standard/mechanical tier) + effort:low.
  regression_auto_block:
    rule: "ANY test that passed before the bounce and now fails = AUTO-BLOCK, even in delta scope — the guardrail for the cross-cutting regressions delta review structurally can't catch."
    decoupled_from_scope: |
      CRITICAL (Architect F3): the auto-block only works if the FULL prior-passing suite
      actually RUNS. So decouple the two — exploit "cheap to run the whole suite, expensive
      to re-REASON the whole surface":
        - The LLM REVIEW is delta-scoped (read prior PASS + diff + relevant slices).
        - The TEST SUITE is NOT — on every bounce-fix the orchestrator/QA runs the ENTIRE
          prior-passing test set (it's CI, not an LLM call). A red in an UNTOUCHED file the
          diff silently broke (transitive import / shared type / migration side-effect) then
          fires the auto-block. Without this, delta review is blind to exactly its own failure mode.
      Implementation: QA delta mode runs `<full test command>` (the same one that last PASSed),
      not a changed-lines subset; only its REASONING about findings is delta-scoped.
  # NOTE: these keys are the cross-file surface interface (classify_lane.py emits them,
  # the orchestrator consumes them) — preserved verbatim; only the examples are de-brained.
  high_stakes_paths:            # a fix touching ANY of these forces a FULL re-review
    - compliance      # the product's compliance regime (per COMPLIANCE.md)
    - multi_tenancy   # the tenant-isolation key at any of the isolation layers
    - metric_engine   # any metric / cross-runtime parity (the metric registry, per METRICS.md)
    - decision_log    # system-of-record audit-log writes
    - money           # money math (minor units) — billing / metering paths
    - outbound_channel
    - auth
  full_reverify_also_when: "the diff exceeds the bounced finding's blast radius (new files/endpoints/migrations not named in the bounce)"

# ---------------------------------------------------------------------------
# PROMPT CACHING — fix #0, the highest-ROI lever (validated by research, was
# under-weighted in the first design). Repeated agent calls share a large prefix
# (system prompt + canon + tool defs). Cache reads cost ~0.1x input; real systems
# cut 70–90%. "Not optional for agentic systems running >3–5 steps" — an 8-stage /
# 11-agent pipeline is the textbook case.
# ---------------------------------------------------------------------------
caching:
  principle: "STABILIZE the shared prefix, SHRINK only the variable part. Shrinking the system prompt helps per-call cost but a smaller prefix caches LESS — the two goals conflict unless you separate them."
  stable_prefix_order:          # byte-stable, cached; never put per-run data here
    - system_prompt             # prompts/system-prompt.md (frozen)
    - tool_defs
    - canon_context             # the specific TECH/NN § the task needs (stable per topic)
    - role_boilerplate
  cache_breakpoint: "on the LAST shared block (canon/tool defs), NOT on the per-task user message"
  dynamic_after_breakpoint: "req_id, run-folder paths, the diff, per-task input, lazily-loaded skill bodies — ALL go AFTER the breakpoint. A lazily-loaded skill landing inside the prefix busts the cache for everything after it."
  ttl: "use the 1-hour cache TTL for the shared system-prompt + canon — a busy multi-agent run cold-starts every 5 min otherwise, turning calls into expensive writes"
  forbidden_in_prefix: "no timestamps, no per-run IDs, no random hex, no live state — these bust the cache on every spawn (this is why timestamps/IDs are appended, never prefixed)"
  measure: "log cache_read_tokens via usage_logger; target >60% hit rate on the long-context stages before declaring a caching win (dashboard surfaces cache-hit %)"

# ---------------------------------------------------------------------------
# ADOPT-NEXT (research-backed, not yet built — ranked). See engineering-os-blueprint/11 §7.
# ---------------------------------------------------------------------------
adopt_next:
  - "Batch API (50% off) for non-interactive stages — full security/QA sweeps, eval runs, nightly reports; stacks with caching → ~5% of original price"
  - "Eval-gated cascade: run the cheap model + a confidence/verifier check, escalate to the deep tier ONLY on low confidence — even some judgment stages skip the deep tier per-bounce (FrugalGPT: match frontier at up to 98% savings)"
  - "Typed structured handoffs between stages (a bounce carries a structured delta, not re-explained prose) — kills retries + re-explanation (MetaGPT result)"
  - "effort: tiering — delta-reviewer effort:low, architect effort:high (real Claude Code subagent field)"
  - "Fork subagents (CLAUDE_CODE_FORK_SUBAGENT) for parallel re-review — inherit the parent's cached prefix, ~80% cheaper than fresh spawns"

# ---------------------------------------------------------------------------
# NEGATIVE-CONTROL DoD — kills the #1 recurring bounce cause (fixes O11).
# Enforced in builder DoD + the QA gate.
# ---------------------------------------------------------------------------
verification_validity:
  must_run_under_real_security_context: true   # NO BYPASSRLS / superuser for RLS/tenancy/auth tests
  negative_control_required: true              # every probe/test MUST fail when the protection is removed
  ban_tautological_parity: true                # parity asserted vs an INDEPENDENT source of truth, not itself
  gate: "a green test under security-bypass, an inert probe, or a tautological parity test = FAIL (false confidence is worse than no test)"

# ---------------------------------------------------------------------------
# Telemetry — enforced, not prose (fixes O14/O13). See tools/usage_logger.py.
# ---------------------------------------------------------------------------
telemetry:
  after_every_spawn: "orchestrator calls tools/usage_logger.py log ... with the Agent result's usage + review_scope + the actual model"
  assert_before_advance: "tools/usage_logger.py assert ... — a missing row is a DEFECT (exit 3), re-log before routing on"
  live_log_heartbeat: "/watch warns when live.log mtime lags active.json / usage.jsonl (silence != idle)"
